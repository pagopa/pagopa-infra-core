# only manual
trigger: none
pr: none

parameters:
  - name: 'DEV'
    displayName: 'Run on DEV environment'
    type: boolean
    default: True
    values:
      - False
      - True



pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: terraform
      type: github
      name: pagopa/azure-pipeline-templates
      ref: refs/tags/v6.9.0
      endpoint: "io-azure-devops-github-ro"


variables:
  TIME_OUT: 15
  # working dir
  WORKING_DIR: 'src/release-notes-agent/rn-agent-common'
  WORKING_DIR_SECRET: 'src/release-notes-agent/rn-agent-secrets'
  DOMAIN_NAME: core

stages:
  #DEV
  - ${{ if eq(parameters['DEV'], true) }}:
    - template: './base-deploy-pipelines.yml'
      parameters:
        ENV: 'dev'
        ENV_FOLDER: 'dev'
        WORKING_DIR_MODULE: ${{ variables.WORKING_DIR }}
        WORKING_DIR_SECRET: ${{ variables.WORKING_DIR_SECRET }}
        DOMAIN_NAME: ${{ variables.DOMAIN_NAME }}
        SC_PLAN_NAME: '$(TF_AZURE_SERVICE_CONNECTION_PLAN_NAME_DEV)'
        SC_APPLY_NAME: '$(TF_AZURE_SERVICE_CONNECTION_APPLY_NAME_DEV)'
        POOL_NAME: '$(TF_POOL_NAME_DEV)'
        SECRET_USE_AKS: false


